# ════════════════════════════════════════════════
# CleverBooks — Development Docker Compose
# ════════════════════════════════════════════════
# Usage:  docker compose -f docker-compose-dev.yml up
# Hot reload enabled for both backend and frontend.
# No need to rebuild on code changes!

services:
  # Redis for BullMQ queue
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API — hot reload via nodemon
  backend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=5000
      - NODE_ENV=development
      - RECONCILIATION_CRON=0 2 * * *
      - RECONCILIATION_TZ=Asia/Kolkata
      - WEBHOOK_URL=${WEBHOOK_URL}
    volumes:
      - ./backend:/app
      - backend_modules:/app/node_modules
    command: sh -c "npm install && npx nodemon --watch . --ext js,json server.js"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Frontend React — Vite dev server with HMR
  frontend:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3000:5173"
    environment:
      - VITE_API_BASE=http://localhost:5000/api
    volumes:
      - ./frontend:/app
      - frontend_modules:/app/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
  backend_modules:
  frontend_modules:
